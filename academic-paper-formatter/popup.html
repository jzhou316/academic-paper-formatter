<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #333;
    }
    .info {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
      line-height: 1.5;
      max-height: 200px;
      overflow-y: auto;
    }
    .info-label {
      font-weight: 600;
      color: #666;
      margin-bottom: 4px;
    }
    .info-value {
      color: #333;
      margin-bottom: 8px;
    }
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .primary {
      background: #4285f4;
      color: white;
    }
    .primary:hover {
      background: #3367d6;
    }
    .secondary {
      background: #34a853;
      color: white;
    }
    .secondary:hover {
      background: #2d8e47;
    }
    .tertiary {
      background: #ea8600;
      color: white;
    }
    .tertiary:hover {
      background: #d47400;
    }
    .error {
      color: #d93025;
      font-size: 13px;
      padding: 8px;
      background: #fce8e6;
      border-radius: 4px;
      margin-bottom: 12px;
    }
    .success {
      color: #137333;
      font-size: 13px;
      padding: 8px;
      background: #e6f4ea;
      border-radius: 4px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <h3>📄 Academic Paper Formatter</h3>
  <div id="message"></div>
  <div id="diagnosis" style="display: none; background: #fff3cd; color: #856404; padding: 8px; border-radius: 4px; margin-bottom: 12px; font-size: 12px; max-height: 150px; overflow-y: auto;"></div>
  <div id="info" class="info" style="display: none;"></div>
  <div class="button-group">
    <button id="copyMarkdown" class="primary">Copy as Markdown</button>
    <button id="copyGoogleDocs" class="secondary">Copy as Linked Text</button>
    <button id="copyPlainText" class="tertiary">Copy as Plain Text</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
